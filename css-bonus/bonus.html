<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bonus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
    <header></header>
    <main class="lmain">
        <!-- !/ sidebar -->

        <aside class="sidebar">
            <!-- todo/ first section of the sidebar -->
            <div class="sidebarfirstgroup">
                <!-- todo/ avatar -->
                <div class="avatardiv">
                    <img src="imgs/my-profile-img.jpg" alt="pic" class="avatar" >
                </div>
                <!-- todo/ username -->
                <div class="usernamediv">
                    <h1 class="username">
                        Amin Ohr
                    </h1>
                </div>
            </div>

            <!-- todo/ socials -->
            <div class="socialsdiv">
                <!-- ?/  discord -->
                <div class="singlesocialdiv">
                    <a href="#" class="sociallink">
                        <i class="bx bxl-discord-alt"></i>
                    </a>

                </div>
                <!-- ?/  whatsapp -->
                <div class="singlesocialdiv">
                    <a href="#" class="sociallink"><i class="bx bxl-whatsapp"></i></a>

                </div>
                <!-- ?/ instagram -->
                <div class="singlesocialdiv">
                    <a href="#" class="sociallink"><i class="bx bxl-instagram"></i></a>

                </div>
                <!-- ?/ linkedin -->
                <div class="singlesocialdiv">
                    <a href="#" class="sociallink"><i class="bx bxl-linkedin-square"></i></a>

                </div>
                <!-- ?/ gmail -->
                <div class="singlesocialdiv">
                    <a href="#" class="sociallink"><i class="bx bxl-gmail"></i></a>

                </div>
            </div>
            <!--todo/ navbar -->
            <div class="navbar">
                <!-- ?/ home -->
                <div class="navitem">
                    <div class="icondiv">
                        <i class="bx bx-home"></i>

                    </div>
                    <div class="navitemname">
                        <a href="#" class="barlink">Home
                        </a>
                    </div>
                </div>
                <!-- ?/ about -->
                <div class="navitem">
                    <div class="icondiv">
                        <i class="bx bx-user"></i>
                    </div>
                    <div class="navitemname">
                        <a href="#" class="barlink">About
                        </a>
                    </div>
                </div>
                <!-- ?/ resume -->
                <div class="navitem">
                    <div class="icondiv">
                        <i class="bx bx-file"></i>
                    </div>
                    <div class="navitemname">
                        <a href="#" class="barlink">Resume
                        </a>
                    </div>
                </div>
                <!-- ?/ Portfolio -->
                <div class="navitem">
                    <div class="icondiv">
                        <i class="bx bx-book-open"></i>
                    </div>
                    <div class="navitemname">
                        <a href="#" class="barlink">Portfolio
                        </a>
                    </div>
                </div>
                <!-- ?/ Services -->
                <div class="navitem">
                    <div class="icondiv">
                        <i class="bx bx-server"></i>
                    </div>
                    <div class="navitemname">
                        <a href="#" class="barlink">Services
                        </a>
                    </div>

                </div>
                <!-- ?/ Contact -->
                <div class="navitem">
                    <div class="icondiv">
                        <i class="bx bx-envelope"></i>

                    </div>
                    <div class="navitemname">
                        <a href="#" class="barlink">Contact
                        </a>
                    </div>
                </div>
                <!-- ? finish -->
            </div>
            <div class="sidebarfooter">
                <h3>
                    &copy;Copyright <b>iPortfolio</b>
                </h3>
                <p>
                    Designed by <a href="#">BootstrapMade</a>
                </p>
            </div>
        </aside>
        <div class="pagecontent">
            <div class="innerdiv">
                <h1 class="bigname">Amin Ohr</h1>
                <p class="sub">I'm a developer</p>
            </div>

        </div>
    </main>
</body>

</html>
